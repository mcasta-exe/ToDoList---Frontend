<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <div class="tasks-container">
        <div id="criar-task">
              <label for="nome-tarefa">Criar nova tarefa:</label>
              <input type="text" id="nova-task" placeholder="Nova Task">
              <button type="button">Criar</button>
        </div>
        <div id="listar-task">
            <label for="lista-tarefas">Minha Lista de Tarefas</label>
            <ul id="tasks">
            </ul>
        </div>
    </div>
<button class="logout-button" id="sair">Sair</button>

<script src="js/tasks.js"></script>
</body>
</html>
